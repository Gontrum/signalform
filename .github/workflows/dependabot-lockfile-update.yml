name: Dependabot Lockfile Update

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Try frozen install first
        id: frozen_install
        continue-on-error: true
        run: pnpm install --frozen-lockfile

      - name: Update lockfile if frozen install failed
        if: steps.frozen_install.outcome == 'failure'
        run: |
          echo "Lockfile is outdated, updating..."
          pnpm install --no-frozen-lockfile

      - name: Commit updated lockfile
        if: steps.frozen_install.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet pnpm-lock.yaml; then
            echo "No changes to lockfile"
            exit 0
          fi

          git add pnpm-lock.yaml
          git commit -m "chore: update pnpm-lock.yaml"
          git push
