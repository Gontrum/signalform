packages:
  - "packages/*"

# Workspace deps are injected (hard-linked copies instead of symlinks) — the
# pnpm >=10 default expected by `pnpm deploy` in the Dockerfile. The sync
# setting re-copies @signalform/shared into its dependents whenever its
# build script runs, so the dev loop keeps seeing fresh dist output.
injectWorkspacePackages: true
syncInjectedDepsAfterScripts:
  - build

# pnpm 11 blocks dependency build scripts by default; esbuild needs its
# postinstall to fetch the platform binary (required by vite).
allowBuilds:
  esbuild: true

minimumReleaseAgeExclude:
  - "@typescript-eslint/eslint-plugin@8.65.0"
  - "@typescript-eslint/parser@8.65.0"
  - "@typescript-eslint/project-service@8.65.0"
  - "@typescript-eslint/scope-manager@8.65.0"
  - "@typescript-eslint/tsconfig-utils@8.65.0"
  - "@typescript-eslint/type-utils@8.65.0"
  - "@typescript-eslint/types@8.65.0"
  - "@typescript-eslint/typescript-estree@8.65.0"
  - "@typescript-eslint/utils@8.65.0"
  - "@typescript-eslint/visitor-keys@8.65.0"
