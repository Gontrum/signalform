<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Signalform</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafafa;
        color: #171717;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      .container { max-width: 360px; }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { color: #737373; font-size: 0.95rem; line-height: 1.6; }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        min-height: 44px;
        background: #171717;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        cursor: pointer;
      }
    </style>
    <script>
      const isLocalDevHost = () =>
        (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') &&
        window.location.port === '3000'

      const clearDevOfflineState = async () => {
        const registrations =
          'serviceWorker' in navigator ? await navigator.serviceWorker.getRegistrations() : []

        await Promise.all(
          registrations.map(async (registration) => {
            await registration.unregister()
          }),
        )

        if ('caches' in window) {
          const cacheKeys = await caches.keys()
          await Promise.all(
            cacheKeys.map(async (cacheKey) => {
              await caches.delete(cacheKey)
            }),
          )
        }

      }

      const waitForRecoveryNavigation = async () => {
        if (!('serviceWorker' in navigator)) {
          return
        }

        await new Promise((resolve) => {
          const timeoutId = window.setTimeout(resolve, 400)

          navigator.serviceWorker.addEventListener(
            'controllerchange',
            () => {
              window.clearTimeout(timeoutId)
              resolve()
            },
            { once: true },
          )
        })
      }

      const recoverAndReload = async () => {
        if (isLocalDevHost()) {
          try {
            if ('serviceWorker' in navigator) {
              await navigator.serviceWorker.register('/sw.js', {
                scope: '/',
                updateViaCache: 'none',
              })
              await waitForRecoveryNavigation()
              window.location.assign('/')
              return
            }
          } catch (_error) {
            await clearDevOfflineState()
          }
        }

        window.location.assign('/')
      }

      window.addEventListener('load', () => {
        const retryButton = document.getElementById('retry-button')
        retryButton?.addEventListener('click', () => {
          void recoverAndReload()
        })

        const shouldAttemptAutomaticRecovery = isLocalDevHost()
          ? navigator.onLine === true
          : true

        if (!shouldAttemptAutomaticRecovery) {
          return
        }

        void recoverAndReload()
      })
    </script>
  </head>
  <body>
    <div class="container" data-testid="offline-page">
      <h1>You're offline</h1>
      <p>Signalform needs a connection to your music server. Check that you're on the same network and try again.</p>
      <button id="retry-button">Try again</button>
    </div>
  </body>
</html>
