<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Signalform</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafafa;
        color: #171717;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      .container { max-width: 360px; }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { color: #737373; font-size: 0.95rem; line-height: 1.6; }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        min-height: 44px;
        background: #171717;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container" data-testid="offline-page">
      <h1>You're offline</h1>
      <p>Signalform needs a connection to your music server. Check that you're on the same network and try again.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
